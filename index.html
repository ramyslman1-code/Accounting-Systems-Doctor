<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounting Systems Doctor</title>
  <style>
    :root {
      --bg: #f4f9ff;
      --surface: #ffffff;
      --text: #0c2f58;
      --muted: #516b87;
      --primary: #0b4f9c;
      --primary-2: #083d79;
      --accent: #fff3e6;
      --line: #d7e6f6;
      --success: #1f9d45;
      --orange: #f08a19;
      --shadow: 0 12px 30px rgba(11, 79, 156, 0.14);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 100% 0%, #dff0ff 0%, transparent 36%),
        radial-gradient(circle at 0% 100%, #e9ffe9 0%, transparent 34%),
        radial-gradient(circle at 50% 100%, #fff1df 0%, transparent 28%),
        var(--bg);
    }

    .container {
      width: min(1120px, 92%);
      margin-inline: auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 249, 255, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .nav {
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--primary-2);
    }

    .brand img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: 0 8px 18px rgba(11, 79, 156, 0.18);
      padding: 4px;
    }

    .contact {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      color: var(--primary-2);
      text-decoration: none;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: stretch;
      padding: 48px 0 24px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(31,157,69,.09), transparent 42%),
        radial-gradient(circle at 88% 0%, rgba(11,79,156,.11), transparent 38%),
        var(--surface);
      border: 1px solid #cfe0f3;
      border-radius: var(--radius);
      box-shadow: 0 16px 34px rgba(11,79,156,.14);
      padding: 30px;
      height: 280px;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255,255,255,.45), rgba(255,255,255,0));
    }

    h1 {
      margin: 0 0 10px;
      line-height: 1.4;
      font-size: clamp(1rem, 1.5vw, 1.4rem);
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
      font-size: 1rem;
      max-width: 62ch;
    }

    .cta {
      margin-top: 22px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      background: linear-gradient(135deg, #1f9d45, #16a34a);
      color: #fff;
      box-shadow: 0 10px 22px rgba(22,163,74,.27);
    }

    .btn.primary:hover {
      background: #17833a;
      transform: translateY(-2px);
    }

    .btn.secondary {
      background: #fff6ea;
      color: var(--primary-2);
      border: 1px solid #e7d7bf;
      box-shadow: 0 8px 16px rgba(12,47,88,.08);
    }

    .btn.secondary:hover {
      transform: translateY(-2px);
      background: #ffefd8;
    }

    .hero-stat {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, #0a4a95, #0e7f6d 58%, #1f9d45);
      color: #fff;
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 16px 34px rgba(8,61,121,.27);
      border: 1px solid rgba(255,255,255,.24);
      height: 280px;
    }

    .hero-stat::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      top: -75px;
      left: -70px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.34), rgba(255,255,255,0) 70%);
    }

    .hero-stat h3 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      letter-spacing: .2px;
    }

    .hero-stat p {
      margin: 0;
      opacity: .95;
      line-height: 1.8;
    }

    section {
      padding: 20px 0;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.35rem;
      color: var(--primary-2);
    }

    .programs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,.05);
    }

    .card .icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--accent);
      font-size: 1.35rem;
    }

    .card .icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
    }

    .card h4 {
      margin: 0;
      font-size: 1.02rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: .95rem;
      min-height: 56px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: auto;
    }

    .price {
      font-weight: 900;
      color: var(--orange);
    }

    .buy {
      border: 0;
      border-radius: 10px;
      background: var(--success);
      color: #fff;
      padding: 8px 12px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .buy:hover { background: #17833a; }

    .download-btn {
      background: var(--primary);
    }

    .download-btn:hover {
      background: var(--primary-2);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .card-actions .buy {
      flex: 1;
      justify-content: center;
    }

    .note {
      margin-top: 18px;
      background: #fff8df;
      border: 1px solid #f0e0a4;
      border-radius: 12px;
      padding: 10px 12px;
      color: #5a4a1b;
      font-size: .92rem;
    }

    .contact-hub {
      margin-top: 14px;
    }

    .contact-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .contact-item {
      width: 68px;
      height: 68px;
      border-radius: 18px;
      text-decoration: none;
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(0, 0, 0, .10);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .contact-item:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 16px 28px rgba(0, 0, 0, .16);
      filter: saturate(1.08);
    }

    .contact-item::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.18), transparent 55%);
      pointer-events: none;
    }

    .contact-item svg {
      width: 30px;
      height: 30px;
      fill: currentColor;
      position: relative;
      z-index: 1;
    }

    .contact-item.whatsapp {
      background: linear-gradient(135deg, #25d366, #128c7e);
    }

    .contact-item.email {
      background: linear-gradient(135deg, #4f46e5, #2563eb);
    }

    .contact-item.telegram {
      background: linear-gradient(135deg, #27a7e7, #1f7fd4);
    }

    .contact-item.tiktok {
      background: linear-gradient(135deg, #111111, #ff0050);
    }

    .contact-item.instagram {
      background: linear-gradient(135deg, #f58529, #dd2a7b 48%, #8134af 78%, #515bd4);
    }

    .contact-item.youtube {
      background: linear-gradient(135deg, #ff3131, #c50000);
    }

    .contact-item.website {
      background: linear-gradient(135deg, #0f766e, #2563eb);
    }

    .sales-section {
      margin-top: 14px;
    }

    .sales-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .sales-card {
      background: linear-gradient(180deg, #ffffff, #f7fbff);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .05);
    }

    .sales-card h3 {
      margin: 0 0 10px;
      color: var(--primary-2);
      font-size: 1.06rem;
    }

    .sales-phone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(37, 99, 235, .08);
      color: var(--primary-2);
      font-weight: 800;
      text-decoration: none;
      direction: ltr;
    }

    .referral-section {
      margin-top: 18px;
    }

    .referral-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
      gap: 18px;
      align-items: start;
    }

    .referral-card,
    .referral-form-card {
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, .06);
    }

    .referral-card > p {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
    }

    .referral-steps,
    .referral-products,
    .referral-terms {
      margin-top: 18px;
    }

    .referral-steps-grid,
    .referral-products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .referral-step,
    .referral-product-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #ffffff;
    }

    .referral-step strong,
    .referral-product-card h3,
    .referral-form-card h3 {
      display: block;
      margin: 0 0 8px;
      color: var(--primary-2);
      font-size: 1.04rem;
    }

    .referral-step p,
    .referral-product-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .referral-commission {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0 10px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, .08);
      color: var(--primary-2);
      font-weight: 900;
    }

    .referral-terms ul {
      margin: 12px 0 0;
      padding-inline-start: 20px;
      color: var(--muted);
      line-height: 1.9;
    }

    .referral-cta {
      margin-top: 18px;
      display: inline-flex;
    }

    .referral-form-card .request-form {
      margin-top: 0;
    }

    .referral-inline-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: .93rem;
    }

    .referral-register-box {
      margin-bottom: 18px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #ffffff;
    }

    .referral-register-box h4 {
      margin: 0 0 8px;
      color: var(--primary-2);
      font-size: 1rem;
    }

    .referral-register-note {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.8;
      font-size: .93rem;
    }

    .referral-code-result {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(37, 99, 235, .08);
      color: var(--primary-2);
      flex-wrap: wrap;
    }

    .referral-code-result.active {
      display: flex;
    }

    .referral-code-label {
      color: var(--muted);
      font-size: .9rem;
    }

    .referral-code-value {
      font-weight: 900;
      letter-spacing: .08em;
      direction: ltr;
    }

    .pos-reserve {
      display: none;
    }

    .partners-section {
      margin-top: 14px;
    }

    .announcements-section {
      margin-top: 14px;
    }

    .promo-banner {
      margin-top: 16px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(120deg, #ff0033, #ff7a00, #ffd500, #25d366, #00c2ff, #2563eb, #7c3aed, #ff0033);
      background-size: 300% 300%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      padding: 24px;
      color: #ffffff;
      box-shadow: 0 18px 40px rgba(59, 76, 202, .22);
      animation: spectrumShift 14s linear infinite, promoVisibility 12s ease-in-out infinite;
    }

    .promo-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255,255,255,.22), transparent 42%), radial-gradient(circle at bottom right, rgba(255,255,255,.12), transparent 36%);
      pointer-events: none;
    }

    @keyframes spectrumShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes promoVisibility {
      0%, 83.333% {
        opacity: 1;
        transform: translateY(0) scale(1);
        visibility: visible;
        pointer-events: auto;
      }
      83.334%, 100% {
        opacity: 0;
        transform: translateY(-10px) scale(.98);
        visibility: hidden;
        pointer-events: none;
      }
    }

    .promo-banner-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.4fr .8fr;
      gap: 18px;
      align-items: center;
    }

    .promo-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: .9rem;
      font-weight: 800;
    }

    .promo-banner h2 {
      margin: 14px 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.5rem);
      line-height: 1.25;
      color: #ffffff;
      display: inline-block;
      width: max-content;
      max-width: 100%;
      text-shadow: 0 6px 20px rgba(0,0,0,.18);
      animation: promoTitleDrift 6s ease-in-out infinite;
    }

    .promo-title-wrap {
      overflow: hidden;
      display: block;
      width: 100%;
    }

    .promo-banner p {
      margin: 0;
      color: #0b2450;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.32);
      border-radius: 14px;
      padding: 10px 14px;
      line-height: 1.9;
      font-size: clamp(1.08rem, 2vw, 1.34rem);
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(8, 37, 80, .14);
      display: inline-block;
    }

    @keyframes promoTitleDrift {
      0% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-22px);
      }
      50% {
        transform: translateX(0);
      }
      75% {
        transform: translateX(22px);
      }
      100% {
        transform: translateX(0);
      }
    }

    .promo-cta {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #ffffff;
      color: var(--primary-2);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(0,0,0,.12);
    }

    .promo-badge {
      justify-self: end;
      background: linear-gradient(135deg, #ffb703, #fb8500);
      color: #fff;
      border-radius: 20px;
      min-width: 180px;
      min-height: 126px;
      padding: 18px 16px;
      text-align: center;
      box-shadow: 0 12px 26px rgba(251,133,0,.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .promo-badge strong {
      display: block;
      font-size: clamp(2.6rem, 5vw, 3.5rem);
      line-height: 1;
      margin-bottom: 0;
    }

    .announcements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .announcement-card {
      background: linear-gradient(180deg, #fffaf0, #ffffff);
      border: 1px solid #f0dfb2;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.04);
    }

    .announcement-card h3 {
      margin: 0 0 8px;
      color: var(--primary-2);
      font-size: 1.05rem;
    }

    .announcement-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .announcement-card a {
      display: inline-flex;
      margin-top: 12px;
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    .cloud-section {
      margin-top: 16px;
    }

    .cloud-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,.04);
    }

    .cloud-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
    }

    .cloud-badges {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cloud-badges span {
      background: #eef5ff;
      border: 1px solid #d5e4f7;
      color: var(--primary-2);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .86rem;
      font-weight: 700;
    }

    .request-form {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: .9rem;
      font-weight: 700;
      color: var(--primary-2);
    }

    .field input,
    .field select,
    .field textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .submit-row {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .meta-note {
      margin-top: 8px;
      font-size: .84rem;
      color: var(--muted);
    }

    .demo-placeholder {
      margin-top: 16px;
      border: 1px dashed #b7cde7;
      border-radius: 14px;
      background: #f8fbff;
      padding: 14px;
    }

    .demo-placeholder p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .demo-links {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .demo-link-item {
      display: block;
      background: #ffffff;
      border: 1px solid #d6e5f7;
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--primary-2);
      font-weight: 700;
      text-decoration: none;
      word-break: break-all;
    }

    .demo-link-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .demo-link-item span {
      display: block;
      font-weight: 500;
    }

    .partners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .partner-card {
      background: var(--surface);
      border: 1px dashed #b7cde7;
      border-radius: 14px;
      padding: 16px;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .partner-card img {
      display: block;
      width: 100%;
      max-width: 220px;
      max-height: 180px;
      height: auto;
      object-fit: contain;
    }

    .partner-name {
      color: var(--primary-2);
      font-size: .95rem;
      line-height: 1.7;
    }

    footer {
      margin-top: 18px;
      padding: 20px 0 30px;
      color: var(--muted);
      text-align: center;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        padding-top: 30px;
      }

    function buildCloudRequestMessage(formData) {
      const fields = [
        ['اسم المنشأة', formData.get('companyName')],
        ['اسم المسؤول', formData.get('managerName')],
        ['رقم الجوال', formData.get('mobileNumber')],
        ['البريد الإلكتروني', formData.get('emailAddress')],
        ['المدينة', formData.get('city')],
        ['نوع النشاط', formData.get('businessType')],
        ['عدد الفروع', formData.get('branches')],
        ['عدد المستخدمين', formData.get('usersCount')],
        ['تفاصيل الطلب', formData.get('requirements')]
      ];

      const lines = ['طلب جديد من نموذج البرنامج السحابي'];

      fields.forEach(([label, value]) => {
        const normalizedValue = `${value || ''}`.trim();
        if (normalizedValue) {
          lines.push(`${label}: ${normalizedValue}`);
        }
      });

      return lines.join('\n');
    }

    function buildWhatsAppMessageUrl(rawHref, message) {
      const encodedMessage = encodeURIComponent(message || '');
      const normalizedHref = `${rawHref || ''}`.trim();

      if (!normalizedHref) {
        return '';
      }

      const directPhone = normalizedHref.replace(/\D/g, '');
      if (directPhone && !/^https?:/i.test(normalizedHref)) {
        return `https://wa.me/${directPhone}?text=${encodedMessage}`;
      }

      try {
        const url = new URL(normalizedHref);
        const phoneParam = `${url.searchParams.get('phone') || ''}`.replace(/\D/g, '');
        const pathPhone = url.hostname.includes('wa.me') ? url.pathname.replace(/\//g, '').replace(/\D/g, '') : '';
        const targetPhone = phoneParam || pathPhone;

        if (targetPhone) {
          return `https://wa.me/${targetPhone}?text=${encodedMessage}`;
        }

        if (url.hostname.includes('whatsapp.com') || url.hostname.includes('wa.me')) {
          url.searchParams.set('text', message || '');
          return url.toString();
        }
      } catch (error) {
        return normalizedHref;
      }

      return normalizedHref;
    }

    function openWhatsAppConversation(whatsappUrl) {
      const openedWindow = window.open(whatsappUrl, '_blank', 'noopener');

      if (openedWindow) {
        return;
      }

      window.location.href = whatsappUrl;
    }

    function bindCloudRequestActions(data) {
      const form = document.getElementById('cloudRequestForm');
      const whatsappButton = document.getElementById('cloudWhatsappButton');

      if (!form || !whatsappButton) {
        return;
      }

      whatsappButton.addEventListener('click', (event) => {
        event.preventDefault();

        if (!form.reportValidity()) {
          return;
        }

        const message = buildCloudRequestMessage(new FormData(form));
        const whatsappUrl = buildWhatsAppMessageUrl(data.cloud?.mobileButtonHref || '', message);

        if (!whatsappUrl || whatsappUrl === '#') {
          alert('يرجى إضافة رابط واتساب صحيح من لوحة التحكم أولاً.');
          return;
        }

        openWhatsAppConversation(whatsappUrl);
      });
    }

    function buildReferralMessage(formData) {
      const fields = [
        ['اسم المتعاون', formData.get('partnerName')],
        ['رقم جوال المتعاون', formData.get('partnerMobile')],
        ['كود الإحالة', formData.get('referralCode')],
        ['اسم العميل', formData.get('customerName')],
        ['جوال العميل', formData.get('customerMobile')],
        ['المدينة', formData.get('city')],
        ['نوع النشاط', formData.get('businessType')],
        ['المنتج المطلوب', formData.get('requestedProduct')],
        ['العمولة المتوقعة', formData.get('expectedCommission')],
        ['ملاحظات', formData.get('notes')]
      ];

      const lines = ['إحالة جديدة من قسم كن معنا واربح عمولة'];

      fields.forEach(([label, value]) => {
        const normalizedValue = `${value || ''}`.trim();
        if (normalizedValue) {
          lines.push(`${label}: ${normalizedValue}`);
        }
      });

      return lines.join('\n');
    }

    function hashReferralValue(value) {
      return [...`${value || ''}`].reduce((result, character) => ((result * 31) + character.charCodeAt(0)) >>> 0, 7);
    }

    function generateReferralCode(name, mobile) {
      const normalizedName = `${name || ''}`.trim();
      const normalizedMobile = `${mobile || ''}`.replace(/\D/g, '');
      const phoneSuffix = (normalizedMobile.slice(-4) || '0000').padStart(4, '0');
      const hash = hashReferralValue(`${normalizedName}|${normalizedMobile}`).toString(36).toUpperCase().padStart(5, '0').slice(0, 5);
      return `REF-${phoneSuffix}-${hash}`;
    }

    function readStoredReferralCollaborator() {
      try {
        const rawValue = localStorage.getItem('referralCollaborator');
        return rawValue ? JSON.parse(rawValue) : null;
      } catch (error) {
        return null;
      }
    }

    function saveStoredReferralCollaborator(collaborator) {
      try {
        localStorage.setItem('referralCollaborator', JSON.stringify(collaborator));
      } catch (error) {
      }
    }

    function bindReferralActions(data) {
      const form = document.getElementById('referralForm');
      const whatsappButton = document.getElementById('referralWhatsappButton');
      const collaboratorForm = document.getElementById('referralCollaboratorForm');
      const registeredNameField = document.getElementById('registeredCollaboratorName');
      const registeredMobileField = document.getElementById('registeredCollaboratorMobile');
      const copyReferralCodeButton = document.getElementById('copyReferralCodeButton');
      const generatedReferralCodeBox = document.getElementById('generatedReferralCodeBox');
      const generatedReferralCodeValue = document.getElementById('generatedReferralCodeValue');
      const partnerNameField = document.getElementById('referralPartnerName');
      const partnerMobileField = document.getElementById('referralPartnerMobile');
      const referralCodeField = document.getElementById('referralCode');

      if (!form || !whatsappButton || !collaboratorForm || !registeredNameField || !registeredMobileField || !copyReferralCodeButton || !generatedReferralCodeBox || !generatedReferralCodeValue || !partnerNameField || !partnerMobileField || !referralCodeField) {
        return;
      }

      function applyCollaboratorRegistration(collaborator) {
        if (!collaborator || !collaborator.code) {
          generatedReferralCodeBox.classList.remove('active');
          generatedReferralCodeValue.textContent = '';
          copyReferralCodeButton.disabled = true;
          return;
        }

        registeredNameField.value = collaborator.name || '';
        registeredMobileField.value = collaborator.mobile || '';
        partnerNameField.value = collaborator.name || '';
        partnerMobileField.value = collaborator.mobile || '';
        referralCodeField.value = collaborator.code || '';
        generatedReferralCodeValue.textContent = collaborator.code || '';
        generatedReferralCodeBox.classList.add('active');
        copyReferralCodeButton.disabled = false;
      }

      function registerCollaborator(name, mobile) {
        const collaborator = {
          name: `${name || ''}`.trim(),
          mobile: `${mobile || ''}`.trim(),
          code: generateReferralCode(name, mobile)
        };

        saveStoredReferralCollaborator(collaborator);
        applyCollaboratorRegistration(collaborator);
        return collaborator;
      }

      const storedCollaborator = readStoredReferralCollaborator();
      if (storedCollaborator) {
        applyCollaboratorRegistration(storedCollaborator);
      }

      collaboratorForm.addEventListener('submit', (event) => {
        event.preventDefault();

        if (!collaboratorForm.reportValidity()) {
          return;
        }

        const collaborator = registerCollaborator(registeredNameField.value, registeredMobileField.value);
        alert(`تم إنشاء كود الإحالة: ${collaborator.code}`);
      });

      copyReferralCodeButton.addEventListener('click', async () => {
        const referralCode = generatedReferralCodeValue.textContent.trim();
        if (!referralCode) {
          return;
        }

        try {
          await navigator.clipboard.writeText(referralCode);
          alert('تم نسخ كود الإحالة.');
        } catch (error) {
          window.prompt('انسخ كود الإحالة التالي:', referralCode);
        }
      });

      whatsappButton.addEventListener('click', (event) => {
        event.preventDefault();

        if (!referralCodeField.value.trim() && partnerNameField.value.trim() && partnerMobileField.value.trim()) {
          registerCollaborator(partnerNameField.value, partnerMobileField.value);
        }

        if (!form.reportValidity()) {
          return;
        }

        const message = buildReferralMessage(new FormData(form));
        const whatsappUrl = buildWhatsAppMessageUrl(data.referralWhatsappHref || '', message);

        if (!whatsappUrl || whatsappUrl === '#') {
          alert('يرجى إضافة رابط واتساب صحيح لقسم الإحالة من لوحة التحكم أولاً.');
          return;
        }

        openWhatsAppConversation(whatsappUrl);
      });
    }

    async function loadSiteData() {
      let data = null;
      const urlParams = new URLSearchParams(window.location.search);
      const isPreviewMode = urlParams.get('preview') === '1';

      const localSiteData = isPreviewMode ? localStorage.getItem('siteData') : null;
      if (localSiteData) {
        try {
          data = normalizeSiteData(JSON.parse(localSiteData));
        } catch (error) {
          console.error('Error reading local site data:', error);
        }
      }

      if (!data) {
        try {
          const response = await fetch('site-data.json');
          if (!response.ok) throw new Error('Failed to load site data');
          data = normalizeSiteData(await response.json());
        } catch (error) {
          console.error('Error loading site data:', error);
          data = normalizeSiteData(fallbackSiteData);
        }
      }

      const savedPartners = isPreviewMode ? localStorage.getItem('partners') : null;
      if (savedPartners) {
        try {
          const localPartners = JSON.parse(savedPartners);
          if (Array.isArray(localPartners) && localPartners.length > 0) {
            data.partners = localPartners;
          }
        } catch (error) {
          console.error('Error reading local partners:', error);
        }
      }

      renderSite(data);
      bindCloudRequestActions(data);
      bindReferralActions(data);
    }

    loadSiteData();
