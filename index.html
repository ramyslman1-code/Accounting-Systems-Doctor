<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounting Systems Doctor</title>
  <style>
    :root {
      --bg: #f4f9ff;
      --surface: #ffffff;
      --text: #0c2f58;
      --muted: #516b87;
      --primary: #0b4f9c;
      --primary-2: #083d79;
      --accent: #fff3e6;
      --line: #d7e6f6;
      --success: #1f9d45;
      --orange: #f08a19;
      --shadow: 0 12px 30px rgba(11, 79, 156, 0.14);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 100% 0%, #dff0ff 0%, transparent 36%),
        radial-gradient(circle at 0% 100%, #e9ffe9 0%, transparent 34%),
        radial-gradient(circle at 50% 100%, #fff1df 0%, transparent 28%),
        var(--bg);
    }

    .container {
      width: min(1120px, 92%);
      margin-inline: auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 249, 255, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .nav {
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--primary-2);
    }

    .brand img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: 0 8px 18px rgba(11, 79, 156, 0.18);
      padding: 4px;
    }

    .contact {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      color: var(--primary-2);
      text-decoration: none;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: stretch;
      padding: 48px 0 24px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(31,157,69,.09), transparent 42%),
        radial-gradient(circle at 88% 0%, rgba(11,79,156,.11), transparent 38%),
        var(--surface);
      border: 1px solid #cfe0f3;
      border-radius: var(--radius);
      box-shadow: 0 16px 34px rgba(11,79,156,.14);
      padding: 30px;
      height: 280px;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255,255,255,.45), rgba(255,255,255,0));
    }

    h1 {
      margin: 0 0 10px;
      line-height: 1.4;
      font-size: clamp(1rem, 1.5vw, 1.4rem);
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
      font-size: 1rem;
      max-width: 62ch;
    }

    .cta {
      margin-top: 22px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      background: linear-gradient(135deg, #1f9d45, #16a34a);
      color: #fff;
      box-shadow: 0 10px 22px rgba(22,163,74,.27);
    }

    .btn.primary:hover {
      background: #17833a;
      transform: translateY(-2px);
    }

    .btn.secondary {
      background: #fff6ea;
      color: var(--primary-2);
      border: 1px solid #e7d7bf;
      box-shadow: 0 8px 16px rgba(12,47,88,.08);
    }

    .btn.secondary:hover {
      transform: translateY(-2px);
      background: #ffefd8;
    }

    .hero-stat {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, #0a4a95, #0e7f6d 58%, #1f9d45);
      color: #fff;
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 16px 34px rgba(8,61,121,.27);
      border: 1px solid rgba(255,255,255,.24);
      height: 280px;
    }

    .hero-stat::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      top: -75px;
      left: -70px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.34), rgba(255,255,255,0) 70%);
    }

    .hero-stat h3 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      letter-spacing: .2px;
    }

    .hero-stat p {
      margin: 0;
      opacity: .95;
      line-height: 1.8;
    }

    section {
      padding: 20px 0;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.35rem;
      color: var(--primary-2);
    }

    .programs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,.05);
    }

    .card .icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--accent);
      font-size: 1.35rem;
    }

    .card .icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
    }

    .card h4 {
      margin: 0;
      font-size: 1.02rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: .95rem;
      min-height: 56px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: auto;
    }

    .price {
      font-weight: 900;
      color: var(--orange);
    }

    .buy {
      border: 0;
      border-radius: 10px;
      background: var(--success);
      color: #fff;
      padding: 8px 12px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .buy:hover { background: #17833a; }

    .download-btn {
      background: var(--primary);
    }

    .download-btn:hover {
      background: var(--primary-2);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .card-actions .buy {
      flex: 1;
      justify-content: center;
    }

    .note {
      margin-top: 18px;
      background: #fff8df;
      border: 1px solid #f0e0a4;
      border-radius: 12px;
      padding: 10px 12px;
      color: #5a4a1b;
      font-size: .92rem;
    }

    .contact-hub {
      margin-top: 14px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .contact-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .04);
      transition: transform .15s ease, border-color .15s ease;
      display: block;
    }

    .contact-item:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .contact-item .label {
      display: block;
      color: var(--muted);
      font-size: .86rem;
      margin-bottom: 5px;
    }

    .contact-item strong {
      font-size: .98rem;
      color: var(--primary-2);
      word-break: break-all;
    }

    .pos-reserve {
      display: none;
    }

    .partners-section {
      margin-top: 14px;
    }

    .announcements-section {
      margin-top: 14px;
    }

    .promo-banner {
      margin-top: 16px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(120deg, #ff0033, #ff7a00, #ffd500, #25d366, #00c2ff, #2563eb, #7c3aed, #ff0033);
      background-size: 300% 300%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      padding: 24px;
      color: #ffffff;
      box-shadow: 0 18px 40px rgba(59, 76, 202, .22);
      animation: spectrumShift 14s linear infinite, promoVisibility 12s ease-in-out infinite;
    }

    .promo-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255,255,255,.22), transparent 42%), radial-gradient(circle at bottom right, rgba(255,255,255,.12), transparent 36%);
      pointer-events: none;
    }

    @keyframes spectrumShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes promoVisibility {
      0%, 83.333% {
        opacity: 1;
        transform: translateY(0) scale(1);
        visibility: visible;
        pointer-events: auto;
      }
      83.334%, 100% {
        opacity: 0;
        transform: translateY(-10px) scale(.98);
        visibility: hidden;
        pointer-events: none;
      }
    }

    .promo-banner-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.4fr .8fr;
      gap: 18px;
      align-items: center;
    }

    .promo-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: .9rem;
      font-weight: 800;
    }

    .promo-banner h2 {
      margin: 14px 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.5rem);
      line-height: 1.25;
      color: #ffffff;
    }

    .promo-banner p {
      margin: 0;
      color: rgba(255,255,255,.92);
      line-height: 1.9;
      font-size: 1rem;
    }

    .promo-cta {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #ffffff;
      color: var(--primary-2);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(0,0,0,.12);
    }

    .promo-badge {
      justify-self: end;
      background: linear-gradient(135deg, #ffb703, #fb8500);
      color: #fff;
      border-radius: 20px;
      min-width: 180px;
      min-height: 126px;
      padding: 18px 16px;
      text-align: center;
      box-shadow: 0 12px 26px rgba(251,133,0,.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .promo-badge strong {
      display: block;
      font-size: clamp(2.6rem, 5vw, 3.5rem);
      line-height: 1;
      margin-bottom: 0;
    }

    .announcements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .announcement-card {
      background: linear-gradient(180deg, #fffaf0, #ffffff);
      border: 1px solid #f0dfb2;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.04);
    }

    .announcement-card h3 {
      margin: 0 0 8px;
      color: var(--primary-2);
      font-size: 1.05rem;
    }

    .announcement-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .announcement-card a {
      display: inline-flex;
      margin-top: 12px;
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    .cloud-section {
      margin-top: 16px;
    }

    .cloud-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,.04);
    }

    .cloud-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
    }

    .cloud-badges {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cloud-badges span {
      background: #eef5ff;
      border: 1px solid #d5e4f7;
      color: var(--primary-2);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .86rem;
      font-weight: 700;
    }

    .request-form {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: .9rem;
      font-weight: 700;
      color: var(--primary-2);
    }

    .field input,
    .field select,
    .field textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .submit-row {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .meta-note {
      margin-top: 8px;
      font-size: .84rem;
      color: var(--muted);
    }

    .demo-placeholder {
      margin-top: 16px;
      border: 1px dashed #b7cde7;
      border-radius: 14px;
      background: #f8fbff;
      padding: 14px;
    }

    .demo-placeholder p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .demo-links {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .demo-link-item {
      display: block;
      background: #ffffff;
      border: 1px solid #d6e5f7;
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--primary-2);
      font-weight: 700;
      text-decoration: none;
      word-break: break-all;
    }

    .demo-link-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .demo-link-item span {
      display: block;
      font-weight: 500;
    }

    .partners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .partner-card {
      background: var(--surface);
      border: 1px dashed #b7cde7;
      border-radius: 14px;
      padding: 16px;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .partner-card img {
      display: block;
      width: 100%;
      max-width: 220px;
      max-height: 180px;
      height: auto;
      object-fit: contain;
    }

    .partner-name {
      color: var(--primary-2);
      font-size: .95rem;
      line-height: 1.7;
    }

    footer {
      margin-top: 18px;
      padding: 20px 0 30px;
      color: var(--muted);
      text-align: center;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        padding-top: 30px;
      }

      .hero-card,
      .hero-stat {
        padding: 20px;
      }

      .request-form {
        grid-template-columns: 1fr;
      }

      .promo-banner-inner {
        grid-template-columns: 1fr;
      }

      .promo-badge {
        justify-self: start;
      }
    }
  </style>
</head>

        demoTitle: 'صفحة الديمو | Demo Page',
        demoText: 'رابط ديمو برنامج طبيب المتاجر متاح الآن:',
        demoLinks: [{ id: 1, title: 'ديمو طبيب المتاجر', text: 'https://das-erp-demo.vercel.app', href: 'https://das-erp-demo.vercel.app' }]
      },
      announcementsSectionTitle: 'إعلانات الموقع | Site Announcements',
      announcements: [
        {
          id: 1,
          title: 'خصم 25% لأول 20 عميل',
          text: 'عرض خاص ومحدود على الحلول والأنظمة المحاسبية. احجز الآن واستفد من الخصم قبل اكتمال العدد.',
          linkText: 'اطلب العرض الآن',
          linkHref: 'https://wa.me/966598861163'
        }
      ],
      contactSectionTitle: 'قنوات التواصل | Contact Channels',
      contacts: [
        { label: 'WhatsApp', value: '+966598861163', href: 'https://wa.me/966598861163' },
        { label: 'Email', value: 'doctorsystem8@gmail.com', href: 'mailto:doctorsystem8@gmail.com' },
        { label: 'Telegram Channel', value: 't.me/systemsdoctor', href: 'https://t.me/systemsdoctor' }
      ],
      partnersSectionTitle: 'شركاؤنا | Our Partners',
      partners: [{ id: 1, name: 'تاج البنان لمواد البناء', image: '/taj-albanan-logo.jpeg' }],
      footerText: '© 2026 Accounting Systems Doctor'
    };

    function normalizeSiteData(data) {
      const normalized = JSON.parse(JSON.stringify(data || fallbackSiteData));
      normalized.programs = Array.isArray(normalized.programs) ? normalized.programs : [];
      normalized.contacts = Array.isArray(normalized.contacts) ? normalized.contacts : [];
      normalized.partners = Array.isArray(normalized.partners) ? normalized.partners : [];
      normalized.announcements = Array.isArray(normalized.announcements) ? normalized.announcements : [];
      normalized.cloud = normalized.cloud || {};
      if (!Array.isArray(normalized.cloud.demoLinks)) {
        if (normalized.cloud.demoHref || normalized.cloud.demoLinkText) {
          normalized.cloud.demoLinks = [{
            id: Date.now(),
            title: normalized.cloud.demoLinkTitle || '',
            text: normalized.cloud.demoLinkText || normalized.cloud.demoHref || '',
            href: normalized.cloud.demoHref || ''
          }];
        } else {
          normalized.cloud.demoLinks = [];
        }
      }
      normalized.cloud.demoLinks = normalized.cloud.demoLinks.map((link) => ({
        id: link.id || Date.now(),
        title: link.title || '',
        text: link.text || link.href || '',
        href: link.href || ''
      }));
      if (!normalized.announcementsSectionTitle) {
        normalized.announcementsSectionTitle = 'إعلانات الموقع | Site Announcements';
      }
      return normalized;
    }

    function renderPrograms(programs) {
      return (programs || []).map(program => `
        <article class="card">
          <div class="icon">${program.iconType === 'image' ? `<img src="${program.iconValue}" alt="${program.iconAlt || ''}" />` : program.iconValue}</div>
          <h4>${program.title || ''}</h4>
          <p>${program.description || ''}</p>
          <div class="row">
            <span class="price">${program.price || ''}</span>
            <span>${program.platform || ''}</span>
          </div>
          <div class="card-actions">
            <a class="buy download-btn" href="${program.downloadHref || '#'}" target="_blank" rel="noopener">${program.downloadText || ''}</a>
            <a class="buy" href="${program.licenseHref || '#'}" target="_blank" rel="noopener">${program.licenseText || ''}</a>
          </div>
        </article>
      `).join('');
    }

    function renderFeaturedAnnouncement(announcement) {
      if (!announcement) {
        return '';
      }

      return `
        <section class="promo-banner">
          <div class="promo-banner-inner">
            <div>
              <span class="promo-eyebrow">عرض حصري | Limited Offer</span>
              <h2>${announcement.title || ''}</h2>
              <p>${announcement.text || ''}</p>
              ${announcement.linkHref ? `<a class="promo-cta" href="${announcement.linkHref}" target="_blank" rel="noopener">${announcement.linkText || 'اطلب الآن'}</a>` : ''}
            </div>
            <div class="promo-badge">
              <strong>25%</strong>
            </div>
          </div>
        </section>
      `;
    }

    function renderContacts(contacts) {
      return (contacts || []).map(contact => `
        <a class="contact-item" href="${contact.href || '#'}" target="_blank" rel="noopener">
          <span class="label">${contact.label || ''}</span>
          <strong>${contact.value || ''}</strong>
        </a>
      `).join('');
    }

    function renderPartners(partners) {
      if (!Array.isArray(partners) || partners.length === 0) {
        return '<p style="color: var(--muted); text-align: center;">لا يوجد شركاء مضافون بعد.</p>';
      }

      return partners.map(partner => `
        <div class="partner-card">
          <img src="${partner.image}" alt="${partner.name || ''}" />
          <span class="partner-name">${partner.name || ''}</span>
        </div>
      `).join('');
    }

    function renderAnnouncements(announcements) {
      if (!Array.isArray(announcements) || announcements.length === 0) {
        return '';
      }

      return announcements.map(announcement => `
        <article class="announcement-card">
          <h3>${announcement.title || ''}</h3>
          <p>${announcement.text || ''}</p>
          ${announcement.linkHref ? `<a href="${announcement.linkHref}" target="_blank" rel="noopener">${announcement.linkText || announcement.linkHref}</a>` : ''}
        </article>
      `).join('');
    }

    function renderStats(items) {
      return (items || []).map(item => `<p>${item}</p>`).join('');
    }

    function renderBadges(items) {
      return (items || []).map(item => `<span>${item}</span>`).join('');
    }

    function renderDemoLinks(items) {
      if (!Array.isArray(items) || items.length === 0) {
        return '';
      }

      return `<div class="demo-links">${items.map(item => `
        <a class="demo-link-item" href="${item.href || '#'}" target="_blank" rel="noopener"><strong>${item.title || 'رابط ديمو'}</strong><span>${item.text || item.href || ''}</span></a>
      `).join('')}</div>`;
    }

    function renderSite(data) {
      document.getElementById('navRoot').innerHTML = `
        <div class="brand">
          <img src="/site-logo.png" alt="Accounting Systems Doctor Logo" />
          <span>${data.brandName || ''}</span>
        </div>
        <a class="contact" href="${data.headerContactHref || '#contact'}">${data.headerContactText || ''}</a>
      `;

      document.getElementById('footerRoot').textContent = data.footerText || '© 2026 Accounting Systems Doctor';

      document.getElementById('siteRoot').innerHTML = `
        <section class="hero">
          <article class="hero-card">
            <h1>${data.hero?.title || ''}</h1>
            <p class="lead">${data.hero?.lead || ''}</p>
            <div class="cta">
              <a class="btn primary" href="${data.hero?.primaryButtonHref || '#programs'}">${data.hero?.primaryButtonText || ''}</a>
              <a class="btn secondary" href="${data.hero?.secondaryButtonHref || '#cloud-program'}">${data.hero?.secondaryButtonText || ''}</a>
            </div>
          </article>

          <aside class="hero-stat">
            <h3>${data.heroStats?.title || ''}</h3>
            ${renderStats(data.heroStats?.items)}
          </aside>
        </section>

        ${renderFeaturedAnnouncement(data.announcements?.[0])}

        ${data.announcements?.length > 1 ? `
          <section class="announcements-section">
            <h2 class="section-title">${data.announcementsSectionTitle || ''}</h2>
            <div class="announcements-grid">${renderAnnouncements(data.announcements.slice(1))}</div>
          </section>
        ` : ''}

        <section id="programs">
          <h2 class="section-title">${data.programsSectionTitle || ''}</h2>
          <div class="programs">${renderPrograms(data.programs)}</div>
        </section>

        <section id="cloud-program" class="cloud-section">
          <h2 class="section-title">${data.cloud?.title || ''}</h2>
          <article class="cloud-card">
            <p>${data.cloud?.description || ''}</p>
            <div class="cloud-badges">${renderBadges(data.cloud?.badges)}</div>

            <form class="request-form" action="${data.cloud?.requestFormAction || 'mailto:doctorsystem8@gmail.com'}" method="post" enctype="text/plain">
              <div class="field">
                <label for="companyName">اسم المنشأة | Company Name</label>
                <input id="companyName" name="companyName" type="text" required />
              </div>

              <div class="field">
                <label for="managerName">اسم المسؤول | Contact Person</label>
                <input id="managerName" name="managerName" type="text" required />
              </div>

              <div class="field">
                <label for="mobileNumber">رقم الجوال | Mobile Number</label>
                <input id="mobileNumber" name="mobileNumber" type="tel" required />
              </div>

              <div class="field">
                <label for="emailAddress">البريد الإلكتروني | Email Address</label>
                <input id="emailAddress" name="emailAddress" type="email" required />
              </div>

              <div class="field">
                <label for="city">المدينة | City</label>
                <input id="city" name="city" type="text" />
              </div>

              <div class="field">
                <label for="businessType">نوع النشاط | Business Type</label>
                <input id="businessType" name="businessType" type="text" />
              </div>

              <div class="field">
                <label for="branches">عدد الفروع | Number of Branches</label>
                <input id="branches" name="branches" type="number" min="1" />
              </div>

              <div class="field">
                <label for="usersCount">عدد المستخدمين | Number of Users</label>
                <input id="usersCount" name="usersCount" type="number" min="1" />
              </div>

              <div class="field full">
                <label for="requirements">تفاصيل الطلب | Requirements</label>
                <textarea id="requirements" name="requirements" placeholder="اكتب احتياجك، نوع التقارير المطلوبة، ونقاط التكامل..."></textarea>
              </div>

              <div class="submit-row">
                <button class="btn primary" type="submit">${data.cloud?.requestButtonText || ''}</button>
                <a class="btn secondary" href="${data.cloud?.mobileButtonHref || '#'}" target="_blank" rel="noopener">${data.cloud?.mobileButtonText || ''}</a>
              </div>
            </form>

            <p class="meta-note">${data.cloud?.note || ''}</p>

            <div class="demo-placeholder" id="cloud-demo-placeholder">
              <h3>${data.cloud?.demoTitle || ''}</h3>
              <p>
                ${data.cloud?.demoText || ''}
              </p>
              ${renderDemoLinks(data.cloud?.demoLinks)}
            </div>
          </article>
        </section>

        <section id="contact" class="contact-hub">
          <h2 class="section-title">${data.contactSectionTitle || ''}</h2>
          <div class="contact-grid">${renderContacts(data.contacts)}</div>
        </section>

        <section id="partners" class="partners-section">
          <h2 class="section-title">${data.partnersSectionTitle || ''}</h2>
          <div class="partners-grid">${renderPartners(data.partners)}</div>
        </section>

        <section id="pos-regions-reserve" class="pos-reserve" aria-hidden="true">
          <h3>POS Regions Reserve</h3>
          <ul>
            <li data-region="riyadh"></li>
            <li data-region="jeddah"></li>
            <li data-region="dammam"></li>
          </ul>
        </section>
      `;
    }

    async function loadSiteData() {
      let data = null;

      const localSiteData = localStorage.getItem('siteData');
      if (localSiteData) {
        try {
          data = normalizeSiteData(JSON.parse(localSiteData));
        } catch (error) {
          console.error('Error reading local site data:', error);
        }
      }

      if (!data) {
        try {
          const response = await fetch('site-data.json');
          if (!response.ok) throw new Error('Failed to load site data');
          data = normalizeSiteData(await response.json());
        } catch (error) {
          console.error('Error loading site data:', error);
          data = normalizeSiteData(fallbackSiteData);
        }
      }

      const savedPartners = localStorage.getItem('partners');
      if (savedPartners) {
        try {
          const localPartners = JSON.parse(savedPartners);
          if (Array.isArray(localPartners) && localPartners.length > 0) {
            data.partners = localPartners;
          }
        } catch (error) {
          console.error('Error reading local partners:', error);
        }
      }

      renderSite(data);
    }

    loadSiteData();
  </script>
</body>
</html>
